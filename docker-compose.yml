# One-command local stack for cross-team dev: backend + web.
# Put any optional keys in backend/.env first (see docs/ENV_SETUP.md).
#   docker compose up --build
#   backend → http://localhost:8000   ·   web → http://localhost:3000
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: dev
      CORS_ORIGINS: "*"
      SEED_ON_STARTUP: "true"
      SEED_SAMPLE_CASES: "true"
      # Uncomment to enable Claude etc. (or use backend/.env):
      # LLM_PROVIDER: anthropic
      # LLM_MODEL: claude-sonnet-4-6
      # LLM_API_KEY: sk-ant-...
    volumes:
      - backend_data:/app/data

  web:
    build:
      context: ./web
      args:
        # Browser runs on the host, so it reaches the backend at localhost:8000.
        NEXT_PUBLIC_API_BASE: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend_data:
